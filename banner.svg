  <text x="80" y="164" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#5aafc0" letter-spacing="2.5" fill-opacity="0.8">ZOIKET00</text>
  <!-- verified tag -->
  <rect x="16" y="222" width="128" height="16" fill="#040b15"/>
  <rect x="16" y="222" width="128" height="16" fill="none" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="80" y="233" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#00f5ff" fill-opacity="0.5" letter-spacing="1">ZOIKET00 // VERIFIED_</text>

  <!-- HERO MID -->
  <text x="184" y="62" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00f5ff" fill-opacity="0.4" letter-spacing="3">Hi &gt; I'm</text>
  <text x="184" y="62" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00f5ff" letter-spacing="3">            zoiket00</text>

  <!-- Big name -->
  <text x="184" y="108" font-family="'Orbitron', monospace" font-size="30" font-weight="900" fill="#ffffff" letter-spacing="1">LUIS DAVID</text>
  <text x="184" y="148" font-family="'Orbitron', monospace" font-size="30" font-weight="900" fill="#00f5ff" letter-spacing="1" filter="url(#glow-filter)">IBARRA ALMARIO</text>

