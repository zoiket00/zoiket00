<svg width="1100" height="280" viewBox="0 0 1100 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@400;700;900&amp;family=Exo+2:wght@300;400;700;800&amp;display=swap');
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040c18"/>
      <stop offset="45%" stop-color="#071525"/>
      <stop offset="100%" stop-color="#030810"/>
    </linearGradient>
    <linearGradient id="cyan-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#006677"/>
    </linearGradient>
    <radialGradient id="hero-glow" cx="45%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="avatar-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- scanline pattern -->
    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="3" fill="transparent"/>
      <rect y="3" width="1" height="1" fill="#000000" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1100" height="280" fill="#050d18"/>
  <rect width="1100" height="280" fill="url(#bg)"/>
  <rect width="1100" height="280" fill="url(#hero-glow)"/>
  <rect width="1100" height="280" fill="url(#scan)"/>

  <!-- border -->
  <rect width="1100" height="280" fill="none" stroke="#00f5ff" stroke-width="1" stroke-opacity="0.2"/>

  <!-- TOPBAR -->
  <rect width="1100" height="32" fill="#040b15"/>
  <rect y="31" width="1100" height="1" fill="#00f5ff" fill-opacity="0.15"/>
  <!-- topbar logo -->
  <text x="20" y="21" font-family="'Orbitron', monospace" font-size="12" font-weight="900" fill="#00f5ff" letter-spacing="3" filter="url(#glow-filter)">&lt;/&gt; ZOIKET00</text>
  <text x="152" y="21" font-family="monospace" font-size="14" fill="#00f5ff" fill-opacity="0.2">|</text>
  <text x="163" y="21" font-family="'Share Tech Mono', monospace" font-size="10" fill="#00f5ff" fill-opacity="0.35" letter-spacing="2">&gt;_ DEVELOP. BUILD. SHIP. REPEAT.</text>
  <!-- badges -->
  <rect x="800" y="7" width="90" height="18" fill="#00f5ff" fill-opacity="0.05" stroke="#00f5ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="845" y="20" font-family="'Share Tech Mono', monospace" font-size="8" fill="#00f5ff" text-anchor="middle" letter-spacing="1">SYSTEMS ENG.</text>
  <rect x="898" y="7" width="88" height="18" fill="#00ff88" fill-opacity="0.05" stroke="#00ff88" stroke-opacity="0.3" stroke-width="1"/>
  <text x="942" y="20" font-family="'Share Tech Mono', monospace" font-size="8" fill="#00ff88" text-anchor="middle" letter-spacing="1">OPEN TO REMOTE</text>
  <rect x="994" y="7" width="88" height="18" fill="#ff006e" fill-opacity="0.05" stroke="#ff006e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1038" y="20" font-family="'Share Tech Mono', monospace" font-size="8" fill="#ff006e" text-anchor="middle" letter-spacing="1">BUILDING PRODS</text>

  <!-- AVATAR section left -->
  <rect x="0" y="32" width="160" height="248" fill="#000" fill-opacity="0.3"/>
  <rect x="159" y="32" width="1" height="248" fill="#00f5ff" fill-opacity="0.15"/>
  <!-- avatar glow bg -->
  <circle cx="80" cy="155" r="70" fill="url(#avatar-glow)"/>
  <!-- circuit corners in avatar -->
  <line x1="10" y1="50" x2="30" y2="50" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="30" y1="50" x2="30" y2="40" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="130" y1="50" x2="150" y2="50" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="130" y1="50" x2="130" y2="40" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="10" y1="250" x2="30" y2="250" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="30" y1="250" x2="30" y2="260" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="130" y1="250" x2="150" y2="250" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="130" y1="250" x2="130" y2="260" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="30" cy="50" r="2" fill="#00f5ff" fill-opacity="0.5"/>
  <circle cx="130" cy="50" r="2" fill="#00f5ff" fill-opacity="0.5"/>
  <circle cx="30" cy="250" r="2" fill="#00f5ff" fill-opacity="0.5"/>
  <circle cx="130" cy="250" r="2" fill="#00f5ff" fill-opacity="0.5"/>
  <!-- outer ring dashed -->
  <circle cx="80" cy="155" r="58" fill="none" stroke="url(#ring-grad)" stroke-width="0.8" stroke-opacity="0.6"/>
  <circle cx="80" cy="155" r="52" fill="none" stroke="#00f5ff" stroke-width="0.4" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <!-- avatar circle bg -->
  <circle cx="80" cy="155" r="46" fill="#060f1a"/>
  <circle cx="80" cy="155" r="46" fill="none" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.7"/>
