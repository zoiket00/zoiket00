  <text x="219" y="195" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7.5" fill="#4a9ab0" letter-spacing="1">AI BUILDER</text>
  <rect x="260" y="184" width="72" height="16" fill="#00f5ff" fill-opacity="0.03" stroke="#00f5ff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="296" y="195" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7.5" fill="#4a9ab0" letter-spacing="1">CLEAN ARCH</text>
  <rect x="338" y="184" width="82" height="16" fill="#00f5ff" fill-opacity="0.03" stroke="#00f5ff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="379" y="195" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7.5" fill="#4a9ab0" letter-spacing="1">CARTAGENA CO</text>
  <rect x="426" y="184" width="82" height="16" fill="#00f5ff" fill-opacity="0.03" stroke="#00f5ff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="467" y="195" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7.5" fill="#4a9ab0" letter-spacing="1">REMOTE-READY</text>
  <rect x="514" y="184" width="112" height="16" fill="#00f5ff" fill-opacity="0.03" stroke="#00f5ff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="570" y="195" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7.5" fill="#4a9ab0" letter-spacing="1">COMMERCIAL PRODUCTS</text>

  <!-- stats -->
  <rect x="184" y="210" width="78" height="46" fill="#00f5ff" fill-opacity="0.03" stroke="#00f5ff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="223" y="234" text-anchor="middle" font-family="'Orbitron', monospace" font-size="20" font-weight="900" fill="#00f5ff" filter="url(#glow-filter)">342+</text>
  <text x="223" y="248" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#3a7a90" letter-spacing="1">Unit Tests</text>

  <rect x="268" y="210" width="64" height="46" fill="#00f5ff" fill-opacity="0.03" stroke="#00f5ff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="300" y="234" text-anchor="middle" font-family="'Orbitron', monospace" font-size="20" font-weight="900" fill="#00f5ff" filter="url(#glow-filter)">9</text>
  <text x="300" y="248" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#3a7a90" letter-spacing="1">Proyectos</text>

  <rect x="338" y="210" width="64" height="46" fill="#00f5ff" fill-opacity="0.03" stroke="#00f5ff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="370" y="234" text-anchor="middle" font-family="'Orbitron', monospace" font-size="20" font-weight="900" fill="#ffb300">4</text>
  <text x="370" y="248" text-anchor="middle" font-family="'Share Tech Mono', monospace" font-size="7" fill="#3a7a90" letter-spacing="1">Repos Pub.</text>

  <!-- HERO RIGHT divider -->
  <rect x="888" y="32" width="1" height="248" fill="#00f5ff" fill-opacity="0.1"/>

  <!-- HERO RIGHT -->
  <text x="906" y="68" font-family="'Share Tech Mono', monospace" font-size="8" fill="#00f5ff" fill-opacity="0.35" letter-spacing="3">— DEV QUOTE —</text>
  <text x="906" y="90" font-family="'Exo 2', sans-serif" font-size="11" fill="#5aafc8" font-style="italic">"Junior en título.</text>
  <text x="906" y="108" font-family="'Exo 2', sans-serif" font-size="12" font-weight="700" fill="#00f5ff">Senior en mentalidad.</text>
  <text x="906" y="126" font-family="'Exo 2', sans-serif" font-size="11" fill="#5aafc8" font-style="italic">Construyo productos</text>
  <text x="906" y="144" font-family="'Exo 2', sans-serif" font-size="11" fill="#5aafc8" font-style="italic">comerciales</text>
  <text x="906" y="162" font-family="'Exo 2', sans-serif" font-size="11" fill="#5aafc8" font-style="italic">desde el primer commit."</text>
  <!-- divider line -->
  <rect x="906" y="178" width="170" height="1" fill="url(#cyan-fade)" fill-opacity="0.4"/>
  <!-- available -->
  <circle cx="912" cy="198" r="3" fill="#00ff88"/>
  <text x="920" y="202" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00ff88" fill-opacity="0.8" letter-spacing="1">Disponible para trabajo remoto</text>
  <!-- location -->
  <text x="906" y="224" font-family="'Share Tech Mono', monospace" font-size="9" fill="#3a7a90" letter-spacing="1">📍 Cartagena, Colombia · 2026</text>
</svg>
