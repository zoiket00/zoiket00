<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030810"/>
      <stop offset="30%" stop-color="#071525"/>
      <stop offset="70%" stop-color="#0a1a30"/>
      <stop offset="100%" stop-color="#030810"/>
    </linearGradient>
    <linearGradient id="cyanText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="60%" stop-color="#00cfdd"/>
      <stop offset="100%" stop-color="#0090aa"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00f5ff" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00f5ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="38%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="avatarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f5ff" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="3" fill="transparent"/>
      <rect y="3" width="1" height="1" fill="#000" fill-opacity="0.08"/>
    </pattern>
    <clipPath id="bannerClip">
      <rect width="1200" height="320" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Base background -->
    <rect width="1200" height="320" fill="url(#bgMain)"/>
    <rect width="1200" height="320" fill="url(#glow1)"/>
    <rect width="1200" height="320" fill="url(#glow2)"/>
    <!-- Grid texture -->
    <rect width="1200" height="320" fill="url(#grid)"/>
    <!-- Scanlines -->
    <rect width="1200" height="320" fill="url(#scanlines)"/>

    <!-- ─── CIRCUIT DECORATIONS ─── -->
    <!-- Top-left corner frame -->
    <line x1="20" y1="20" x2="80" y2="20" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="20" y1="20" x2="20" y2="80" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="20" cy="20" r="3" fill="#00f5ff" fill-opacity="0.6"/>
    <line x1="80" y1="20" x2="100" y2="20" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.2"/>
    <circle cx="100" cy="20" r="2" fill="#00f5ff" fill-opacity="0.3"/>
    <line x1="20" y1="80" x2="20" y2="110" stroke="#00f5ff" stroke-width="0.5" stroke-opacity="0.2"/>

    <!-- Top-right corner frame -->
    <line x1="1180" y1="20" x2="1120" y2="20" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="1180" y1="20" x2="1180" y2="80" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="1180" cy="20" r="3" fill="#00f5ff" fill-opacity="0.6"/>

    <!-- Bottom-left corner frame -->
    <line x1="20" y1="300" x2="80" y2="300" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="20" y1="300" x2="20" y2="240" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="20" cy="300" r="3" fill="#00f5ff" fill-opacity="0.6"/>

    <!-- Bottom-right corner frame -->
    <line x1="1180" y1="300" x2="1120" y2="300" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="1180" y1="300" x2="1180" y2="240" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <circle cx="1180" cy="300" r="3" fill="#00f5ff" fill-opacity="0.6"/>

    <!-- Horizontal accent line -->
    <rect x="0" y="58" width="1200" height="1" fill="url(#accentLine)"/>

    <!-- Left decorative circuit nodes -->
    <circle cx="55" cy="58" r="3" fill="#00f5ff" fill-opacity="0.5"/>
    <line x1="55" y1="58" x2="55" y2="90" stroke="#00f5ff" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="55" y1="90" x2="90" y2="90" stroke="#00f5ff" stroke-width="0.8" stroke-opacity="0.3"/>
    <circle cx="90" cy="90" r="2" fill="#00f5ff" fill-opacity="0.3"/>

    <!-- Right decorative elements -->
    <circle cx="1145" cy="58" r="3" fill="#00f5ff" fill-opacity="0.5"/>
    <line x1="1145" y1="58" x2="1145" y2="90" stroke="#00f5ff" stroke-width="0.8" stroke-opacity="0.3"/>

    <!-- ─── TOPBAR ─── -->
    <rect width="1200" height="56" fill="#040b15" fill-opacity="0.95"/>
    <text x="30" y="36" font-family="monospace" font-size="15" font-weight="bold" fill="#00f5ff" letter-spacing="3" filter="url(#softGlow)">&lt;/&gt; ZOIKET00</text>
    <text x="175" y="36" font-family="monospace" font-size="16" fill="#00f5ff" fill-opacity="0.2">|</text>
    <text x="186" y="36" font-family="monospace" font-size="10" fill="#00f5ff" fill-opacity="0.4" letter-spacing="2">&gt;_ DEVELOP. INNOVATE. DOMINATE.</text>

    <!-- Topbar right badges -->
    <rect x="750" y="14" width="105" height="22" fill="#00f5ff" fill-opacity="0.05" stroke="#00f5ff" stroke-opacity="0.3" stroke-width="1"/>
    <text x="803" y="29" font-family="monospace" font-size="8.5" fill="#00f5ff" text-anchor="middle" letter-spacing="1">SYSTEMS ENGINEER</text>
    <rect x="862" y="14" width="105" height="22" fill="#00ff88" fill-opacity="0.05" stroke="#00ff88" stroke-opacity="0.3" stroke-width="1"/>
    <text x="915" y="29" font-family="monospace" font-size="8.5" fill="#00ff88" text-anchor="middle" letter-spacing="1">OPEN TO REMOTE</text>
    <rect x="974" y="14" width="105" height="22" fill="#ffb300" fill-opacity="0.05" stroke="#ffb300" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1027" y="29" font-family="monospace" font-size="8.5" fill="#ffb300" text-anchor="middle" letter-spacing="1">BUILDING PRODS</text>
    <rect x="1086" y="14" width="94" height="22" fill="#ff006e" fill-opacity="0.05" stroke="#ff006e" stroke-opacity="0.3" stroke-width="1"/>
    <text x="1133" y="29" font-family="monospace" font-size="8.5" fill="#ff006e" text-anchor="middle" letter-spacing="1">CARTAGENA CO</text>

    <!-- ─── MAIN CONTENT AREA ─── -->

    <!-- LEFT: Avatar section -->
    <circle cx="122" cy="192" r="75" fill="url(#avatarGlow)"/>
    <circle cx="122" cy="192" r="66" fill="none" stroke="#00f5ff" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="6 4"/>
    <circle cx="122" cy="192" r="58" fill="#060f1a"/>
    <circle cx="122" cy="192" r="58" fill="none" stroke="#00f5ff" stroke-width="2" stroke-opacity="0.7" filter="url(#softGlow)"/>
    <!-- ZK initials -->
    <text x="122" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#00f5ff" letter-spacing="6" filter="url(#textGlow)">ZK</text>
    <text x="122" y="202" text-anchor="middle" font-family="monospace" font-size="9" fill="#5aafc0" letter-spacing="3" fill-opacity="0.9">ZOIKET00</text>
    <!-- Small decorative ring segments -->
    <path d="M 70 155 A 58 58 0 0 1 105 136" fill="none" stroke="#00ff88" stroke-width="2.5" stroke-opacity="0.6"/>
    <path d="M 139 136 A 58 58 0 0 1 174 155" fill="none" stroke="#ffb300" stroke-width="2.5" stroke-opacity="0.6"/>

    <!-- Vertical separator -->
    <line x1="205" y1="70" x2="205" y2="305" stroke="#00f5ff" stroke-width="1" stroke-opacity="0.15"/>

    <!-- ─── CENTER: Name & Title ─── -->
    <!-- Small label -->
    <text x="230" y="88" font-family="monospace" font-size="9" fill="#00f5ff" fill-opacity="0.4" letter-spacing="3">// DEVELOPER PROFILE</text>

    <!-- Main name -->
    <text x="228" y="148" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="2">LUIS DAVID</text>
    <text x="228" y="208" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#cyanText)" letter-spacing="2" filter="url(#textGlow)">IBARRA ALMARIO</text>

    <!-- Subtitle -->
    <text x="230" y="240" font-family="monospace" font-size="14" fill="#5aafc8" letter-spacing="1">I'm a &gt;</text>
    <text x="302" y="240" font-family="monospace" font-size="14" font-weight="bold" fill="#00f5ff"> Systems Engineer</text>
    <text x="480" y="240" font-family="monospace" font-size="14" fill="#5aafc8"> | Software Developer</text>

    <!-- Tags row -->
    <rect x="228" y="255" width="75" height="17" fill="#00f5ff" fill-opacity="0.04" stroke="#00f5ff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="265" y="267" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#4a9ab0" letter-spacing="1">AI BUILDER</text>
    <rect x="309" y="255" width="78" height="17" fill="#00f5ff" fill-opacity="0.04" stroke="#00f5ff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="348" y="267" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#4a9ab0" letter-spacing="1">CLEAN ARCH</text>
    <rect x="393" y="255" width="72" height="17" fill="#00f5ff" fill-opacity="0.04" stroke="#00f5ff" stroke-opacity="0.2" stroke-width="1"/>
    <text x="429" y="267" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#4a9ab0" letter-spacing="1">TDD · 342+</text>
    <rect x="471" y="255" width="90" height="17" fill="#00ff88" fill-opacity="0.04" stroke="#00ff88" stroke-opacity="0.2" stroke-width="1"/>
    <text x="516" y="267" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00ff88" letter-spacing="1">REMOTE-READY 🌎</text>

    <!-- ─── RIGHT: Stats column ─── -->
    <line x1="900" y1="70" x2="900" y2="305" stroke="#00f5ff" stroke-width="1" stroke-opacity="0.12"/>
    <text x="920" y="100" font-family="monospace" font-size="8" fill="#00f5ff" fill-opacity="0.35" letter-spacing="3">— LIVE STATS —</text>

    <!-- Stat: Tests -->
    <rect x="920" y="110" width="230" height="46" fill="#00f5ff" fill-opacity="0.03" stroke="#00f5ff" stroke-opacity="0.12" stroke-width="1"/>
    <text x="940" y="130" font-family="monospace" font-size="10" fill="#5aafc8" letter-spacing="1">UNIT TESTS WRITTEN</text>
    <text x="940" y="148" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#00f5ff" filter="url(#softGlow)">342+</text>

    <!-- Stat: Projects -->
    <rect x="920" y="163" width="110" height="46" fill="#00f5ff" fill-opacity="0.03" stroke="#00f5ff" stroke-opacity="0.12" stroke-width="1"/>
    <text x="940" y="183" font-family="monospace" font-size="9" fill="#5aafc8" letter-spacing="1">PROYECTOS</text>
    <text x="940" y="201" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#00ff88">9</text>

    <!-- Stat: Repos -->
    <rect x="1037" y="163" width="113" height="46" fill="#ffb300" fill-opacity="0.03" stroke="#ffb300" stroke-opacity="0.12" stroke-width="1"/>
    <text x="1057" y="183" font-family="monospace" font-size="9" fill="#a07020" letter-spacing="1">REPOS PUB.</text>
    <text x="1057" y="201" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#ffb300">4↗</text>

    <!-- Available -->
    <circle cx="926" cy="230" r="5" fill="#00ff88" filter="url(#softGlow)"/>
    <text x="938" y="234" font-family="monospace" font-size="10" fill="#00ff88" fill-opacity="0.9" letter-spacing="0.5">Disponible para trabajo remoto</text>
    <text x="920" y="258" font-family="monospace" font-size="9" fill="#3a7a90" letter-spacing="0.5">📍 Cartagena, Colombia · 2026</text>

    <!-- Border -->
    <rect x="0" y="0" width="1200" height="320" fill="none" stroke="#00f5ff" stroke-width="1.5" stroke-opacity="0.25"/>
  </g>
</svg>
